name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ezi-linux-x86_64
            build: linux
          - os: macos-latest
            artifact: ezi-macos-arm64
            build: macos-arm64
          - os: macos-latest
            artifact: ezi-macos-x86_64
            build: macos-x86_64
          - os: windows-latest
            artifact: ezi-windows-x86_64.zip
            build: msys2

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.build == 'linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: startsWith(matrix.build, 'macos')
        run: brew install cmake curl

      - name: Install dependencies (Windows)
        if: matrix.build == 'msys2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-curl
            zip

      - name: Build (Linux)
        if: matrix.build == 'linux'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target ezi -j
          mkdir -p dist
          cp build/ezi "dist/${{ matrix.artifact }}"
          strip "dist/${{ matrix.artifact }}"

      - name: Build (macOS arm64)
        if: matrix.build == 'macos-arm64'
        run: |
          export CURL_ROOT="$(brew --prefix curl)"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_PREFIX_PATH="$CURL_ROOT"
          cmake --build build --target ezi -j
          mkdir -p dist
          cp build/ezi "dist/${{ matrix.artifact }}"
          strip "dist/${{ matrix.artifact }}"

      - name: Build (macOS x86_64)
        if: matrix.build == 'macos-x86_64'
        run: |
          export CURL_ROOT="$(brew --prefix curl)"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_PREFIX_PATH="$CURL_ROOT"
          cmake --build build --target ezi -j
          mkdir -p dist
          cp build/ezi "dist/${{ matrix.artifact }}"
          strip "dist/${{ matrix.artifact }}"

      - name: Build (Windows)
        if: matrix.build == 'msys2'
        shell: msys2 {0}
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target ezi -j
          mkdir -p dist
          cp build/ezi.exe dist/ezi-windows-x86_64.exe
          cp /ucrt64/bin/libcurl-4.dll dist/
          cd dist && zip -j ezi-windows-x86_64.zip ezi-windows-x86_64.exe libcurl-4.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ezi-linux-x86_64
            dist/ezi-macos-arm64
            dist/ezi-macos-x86_64
            dist/ezi-windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
